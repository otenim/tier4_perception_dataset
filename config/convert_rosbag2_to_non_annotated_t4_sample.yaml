task: convert_rosbag2_to_non_annotated_t4
description:
  scene: ""
conversion:
  input_base: ./data/rosbag2
  output_base: ./data/non_annotated_t4_format
  ego_pose:
    tf_topic: /tf
    parent_frame_id: map
    child_frame_id: base_link
  start_timestamp_sec: 0 # Enter here if there is a timestamp for the start time. If not used, enter 0.
  skip_timestamp: 2.0 # Do not load data for the first point cloud timestamp for skip_timestamp seconds.
  num_load_frames: 0 # Maximum number of frames to save as t4 data. Set to 0 to automatically set it based on the number of lidar topics.
  accept_frame_drop: False # If true, the conversion will continue even if the LiDAR frame is dropped.
  undistort_image: False # If true, the camera image will be undistorted.
  # Optional ego_pose fields from freely chosen topics (omit a key to skip that field).
  # twist_topic / acceleration_topic accept EITHER a bare topic name OR a {name, resolve_tf} mapping.
  # With resolve_tf: true (default) the value is rotated into child_frame_id via /tf_static when the
  # source frame differs; with resolve_tf: false it is stored verbatim in its source frame (no
  # rotation, no /tf_static needed) - use this when the source is already in child_frame_id, or is a
  # non-static frame (e.g. map) you do not want rotated by a single static transform.
  # twist_topic: /localization/kinematic_state               # Odometry | TwistStamped | TwistWithCovarianceStamped
  # acceleration_topic: /localization/acceleration           # Imu | AccelStamped | AccelWithCovarianceStamped
  # acceleration_topic:                                       # detailed form (equivalent options):
  #   name: /localization/acceleration
  #   resolve_tf: false                                       # store as-is, skip tf rotation
  # geocoordinate_topic: /sensing/gnss/septentrio/nav_sat_fix # NavSatFix (stored verbatim)
  # The following configuration is generally not modified unless there are changes to the vehicle sensor configuration.
  max_camera_jitter_sec: 0.005
  lidar_latency_sec: 0.005
  system_scan_period_sec: 0.10
  lidar_sensor:
    topic: /sensing/lidar/concatenated/pointcloud
    channel: LIDAR_CONCAT
  camera_sensors: #  Keep the same order as each camera exposure timing
    - topic: /sensing/camera/camera3/image_rect_color/compressed
      channel: CAM_BACK_LEFT
      delay_msec: 48.33
    - topic: /sensing/camera/camera2/image_rect_color/compressed
      channel: CAM_FRONT_LEFT
      delay_msec: 65.0
    - topic: /sensing/camera/camera0/image_rect_color/compressed
      channel: CAM_FRONT
      delay_msec: 81.67
    - topic: /sensing/camera/camera4/image_rect_color/compressed
      channel: CAM_FRONT_RIGHT
      delay_msec: 98.33
    - topic: /sensing/camera/camera5/image_rect_color/compressed
      channel: CAM_BACK_RIGHT
      delay_msec: 115.0
    - topic: /sensing/camera/camera1/image_rect_color/compressed
      channel: CAM_BACK
      delay_msec: 131.67
